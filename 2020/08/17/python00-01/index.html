 class="line">area=<span class="number">3.1415</span>*rad*rad</span><br><span class="line">print(area)</span><br><span class="line">print(<span class="string">"&#123;:.2f&#125;"</span>.format(area))<span class="comment">#只输入两位小数</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#1.2简单的人名对话</span></span><br><span class="line">x=input(<span class="string">"选择是否为复性，1为单姓，2为复姓:"</span>)</span><br><span class="line">x=int(x)</span><br><span class="line">name=input(<span class="string">"输入姓名："</span>)</span><br><span class="line"><span class="keyword">if</span>(x==<span class="number">1</span>):</span><br><span class="line">    print(<span class="string">"&#123;&#125;同学，学好python，继续内卷！"</span>.format(name))</span><br><span class="line">    print(<span class="string">"&#123;&#125;哥，学好python，继续内卷！"</span>.format(name[<span class="number">0</span>]))</span><br><span class="line">    print(<span class="string">"&#123;&#125;妹妹，学好python，继续内卷！"</span>.format(name[<span class="number">1</span>:]))</span><br><span class="line"><span class="keyword">elif</span>(x==<span class="number">2</span>):</span><br><span class="line">    print(<span class="string">"&#123;&#125;同学，学好python，继续内卷！"</span>.format(name))</span><br><span class="line">    print(<span class="string">"&#123;&#125;哥，学好python，继续内卷！"</span>.format(name[<span class="number">0</span>]))</span><br><span class="line">    print(<span class="string">"&#123;&#125;妹妹，学好python，继续内卷！"</span>.format(name[<span class="number">2</span>:]))</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.3斐波那契数列</span></span><br><span class="line">a, b = <span class="number">0</span>, <span class="number">1</span></span><br><span class="line"><span class="keyword">while</span> a &lt; <span class="number">1000</span>:</span><br><span class="line">    print(a,end=<span class="string">','</span>)</span><br><span class="line">    a, b = b, a+b</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.4画圆</span></span><br><span class="line"><span class="keyword">import</span> turtle</span><br><span class="line">turtle.pensize(<span class="number">2</span>)</span><br><span class="line">turtle.circle(<span class="number">10</span>)</span><br><span class="line">turtle.circle(<span class="number">30</span>)</span><br><span class="line">turtle.circle(<span class="number">90</span>)</span><br><span class="line">turtle.circle(<span class="number">180</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.5日期和时间输出</span></span><br><span class="line"><span class="keyword">from</span> datetime <span class="keyword">import</span> datetime</span><br><span class="line">now=datetime.now()</span><br><span class="line">print(now)</span><br><span class="line">now.strftime(<span class="string">"%x"</span>)</span><br><span class="line">now.strftime(<span class="string">"%X"</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.6 smalltest range()</span></span><br><span class="line">print(list(range(<span class="number">10</span>)))</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.1字符串拼接</span></span><br><span class="line">str1=input(<span class="string">"请输入一个人的名字："</span>)</span><br><span class="line">str2=input(<span class="string">"请输入一个国家的名字："</span>)</span><br><span class="line">print(<span class="string">"世界这么大，&#123;&#125;想去&#123;&#125;看看了啊。"</span>.format(str1,str2))</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.2整数序列求和</span></span><br><span class="line">n=input(<span class="string">"请输入整数n:"</span>)</span><br><span class="line">sum=<span class="number">0</span></span><br><span class="line">i=<span class="number">0</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(int(n)):</span><br><span class="line">    sum += i+<span class="number">1</span></span><br><span class="line">print(<span class="string">"1到N求和结果："</span>,sum)</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.3 九九乘法表</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>,<span class="number">10</span>):</span><br><span class="line">    <span class="keyword">for</span> j <span class="keyword">in</span> range(<span class="number">1</span>,i+<span class="number">1</span>):</span><br><span class="line">        print(<span class="string">"&#123;&#125;*&#123;&#125;=&#123;:2&#125;"</span>.format(i,j,i*j),end=<span class="string">''</span>)</span><br><span class="line">        print(<span class="string">''</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.4 计算1到10的阶乘之和</span></span><br><span class="line">sumx, tmp = <span class="number">0</span>, <span class="number">1</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">1</span>,<span class="number">11</span>):</span><br><span class="line">    tmp *= i</span><br><span class="line">    sumx += tmp</span><br><span class="line">print(<span class="string">"运算结果是：&#123;&#125;"</span>.format(sumx))</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.5 猴子吃桃</span></span><br><span class="line">n = <span class="number">1</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>,<span class="number">0</span>,<span class="number">-1</span>):</span><br><span class="line">    n=(n+<span class="number">1</span>)*<span class="number">2</span></span><br><span class="line">print(n)</span><br><span class="line"></span><br><span class="line">n = <span class="number">1</span></span><br><span class="line"><span class="keyword">for</span> i <span class="keyword">in</span> range(<span class="number">4</span>,<span class="number">0</span>,<span class="number">-1</span>):</span><br><span class="line">    n=(n+<span class="number">1</span>)&lt;&lt;<span class="number">2</span></span><br><span class="line">print(n)</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.6 健康食谱输出</span></span><br><span class="line">diet=[<span class="string">'西红柿'</span>,<span class="string">'花椰菜'</span>,<span class="string">'黄瓜'</span>,<span class="string">'牛排'</span>,<span class="string">'虾仁'</span>]</span><br><span class="line"><span class="keyword">for</span> x <span class="keyword">in</span> range(<span class="number">0</span>,<span class="number">5</span>):</span><br><span class="line">    <span class="keyword">for</span> y <span class="keyword">in</span> range(<span class="number">0</span>,x+<span class="number">1</span>):</span><br><span class="line">        <span class="keyword">if</span> <span class="keyword">not</span>(x==y):</span><br><span class="line">            print(<span class="string">"&#123;&#125;&#123;&#125;"</span>.format(diet[x],diet[y]))</span><br><span class="line"></span><br><span class="line">diet=[<span class="string">'西红柿'</span>,<span class="string">'花椰菜'</span>,<span class="string">'黄瓜'</span>,<span class="string">'牛排'</span>,<span class="string">'虾仁'</span>]</span><br><span class="line"><span class="keyword">for</span> x <span class="keyword">in</span> range(<span class="number">0</span>,<span class="number">5</span>):</span><br><span class="line">    <span class="keyword">for</span> y <span class="keyword">in</span> range(<span class="number">0</span>,x+<span class="number">1</span>):</span><br><span class="line">        <span class="keyword">if</span> (x!=y):</span><br><span class="line">            print(<span class="string">"&#123;&#125;&#123;&#125;"</span>.format(diet[x],diet[y]))</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.7五角星的绘制</span></span><br><span class="line"><span class="keyword">import</span> turtle</span><br><span class="line"></span><br><span class="line">turtle.fillcolor(<span class="string">"#3dd"</span>)</span><br><span class="line">turtle.begin_fill()</span><br><span class="line"><span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">    turtle.forward(<span class="number">200</span>)</span><br><span class="line">    turtle.right(<span class="number">144</span>)</span><br><span class="line">    <span class="keyword">if</span> abs(turtle.pos()) &lt; <span class="number">1</span>:</span><br><span class="line">        <span class="keyword">break</span></span><br><span class="line">turtle.end_fill()</span><br><span class="line">turtle.done()</span><br><span class="line"></span><br><span class="line"><span class="comment">#1.x.8太阳花的绘制</span></span><br><span class="line"><span class="keyword">import</span>  turtle</span><br><span class="line">turtle.color(<span class="string">'red'</span>,<span class="string">'yellow'</span>)</span><br><span class="line">turtle.begin_fill()</span><br><span class="line"><span class="keyword">while</span> <span class="literal">True</span>:</span><br><span class="line">    turtle.forward(<span class="number">200</span>)</span><br><span class="line">    turtle.left(<span class="number">170</span>)</span><br><span class="line">    <span class="keyword">if</span> abs(turtle.pos()) &lt; <span class="number">1</span>:</span><br><span class="line">        <span class="keyword">break</span></span><br><span class="line">turtle.end_fill()</span><br><span class="line">turtle.done()</span><br></pre></td></tr></table></figure>
